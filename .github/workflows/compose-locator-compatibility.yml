name: Compose Locator Compatibility

on:
  workflow_dispatch:
    inputs:
      verify_studio_plugin:
        description: "Run JetBrains Plugin Verifier on a self-hosted runner with local IDE paths"
        required: true
        default: false
        type: boolean
      studio_plugin_ide_paths:
        description: "Comma-separated local IDE Contents paths on the self-hosted runner"
        required: false
        default: "/Applications/Android Studio.app/Contents"
        type: string
  schedule:
    - cron: "0 20 * * 0"

concurrency:
  group: compose-locator-compatibility-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    name: Gradle ${{ matrix.gradle }} / AGP ${{ matrix.agp }} / Kotlin ${{ matrix.kotlin }}
    runs-on: macos-14
    timeout-minutes: 60
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - gradle: "8.7"
            agp: "8.6.1"
            kotlin: "2.0.21"
            composeCompiler: "2.0.21"
            composeUi: "1.7.0"
            material3: "1.3.0"
            experimental: false
          - gradle: "8.5"
            agp: "8.5.2"
            kotlin: "2.0.21"
            composeCompiler: "2.0.21"
            composeUi: "1.7.0"
            material3: "1.3.0"
            experimental: true
          - gradle: "8.7"
            agp: "8.7.3"
            kotlin: "2.0.21"
            composeCompiler: "2.0.21"
            composeUi: "1.7.0"
            material3: "1.3.0"
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Patch compatibility versions
        run: |
          ./gradlew wrapper --gradle-version "${{ matrix.gradle }}" --distribution-type bin
          perl -0pi -e 's/id\("com\.android\.application"\) version "[^"]+"/id("com.android.application") version "${{ matrix.agp }}"/g; s/id\("com\.android\.library"\) version "[^"]+"/id("com.android.library") version "${{ matrix.agp }}"/g; s/kotlin\("jvm"\) version "[^"]+"/kotlin("jvm") version "${{ matrix.kotlin }}"/g; s/kotlin\("android"\) version "[^"]+"/kotlin("android") version "${{ matrix.kotlin }}"/g; s/id\("org\.jetbrains\.kotlin\.plugin\.compose"\) version "[^"]+"/id("org.jetbrains.kotlin.plugin.compose") version "${{ matrix.composeCompiler }}"/g' build.gradle.kts
          perl -0pi -e 's/androidx\.compose\.ui:ui:[^"]+/androidx.compose.ui:ui:${{ matrix.composeUi }}/g; s/androidx\.compose\.ui:ui-tooling-preview:[^"]+/androidx.compose.ui:ui-tooling-preview:${{ matrix.composeUi }}/g; s/androidx\.compose\.foundation:foundation:[^"]+/androidx.compose.foundation:foundation:${{ matrix.composeUi }}/g; s/androidx\.compose\.ui:ui-tooling:[^"]+/androidx.compose.ui:ui-tooling:${{ matrix.composeUi }}/g; s/androidx\.compose\.material3:material3:[^"]+/androidx.compose.material3:material3:${{ matrix.material3 }}/g' demo-app/build.gradle.kts

      - name: Verify compatibility lane
        run: ./gradlew --no-daemon verifyComposeCompilerSourceAlignment verifyComposeLocatorBuildEfficiency verifyComposeLocatorReleaseBoundary

      - name: Upload compatibility diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-locator-compatibility-gradle-${{ matrix.gradle }}-agp-${{ matrix.agp }}-kotlin-${{ matrix.kotlin }}
          path: |
            build/reports/composeLocator/**
            demo-app/build/intermediates/composeLocator/**
            demo-feature/build/intermediates/composeLocator/**
          if-no-files-found: ignore

  studio-plugin:
    name: Studio plugin verifier
    runs-on: self-hosted
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' && (inputs.verify_studio_plugin == true || inputs.verify_studio_plugin == 'true') && inputs.studio_plugin_ide_paths != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Studio plugin package and local IDE compatibility
        run: ./gradlew --no-daemon verifyStudioPluginWithPluginVerifier -Pcodelocator.studio.useStubs=true -Pcodelocator.studio.verifier.idePaths="${{ inputs.studio_plugin_ide_paths }}"

      - name: Upload Studio plugin verifier reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-code-locator-studio-plugin-verifier
          path: |
            build/reports/composeLocator/studio-plugin-verifier/**
            studio-plugin/build/distributions/compose-code-locator-*.zip
          if-no-files-found: ignore
