name: Compose Locator CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      device_serial:
        description: "Optional adb serial for connected-device regression"
        required: false
        type: string

concurrency:
  group: compose-locator-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify non-device gates
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Compose Locator
        run: ./gradlew --no-daemon -Dcodelocator.performance.maxExtractionMs=6000 verifyCodeLocator -Pcodelocator.studio.useStubs=true

      - name: Upload rollout report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-locator-rollout-report
          path: |
            build/reports/composeLocator/rollout/rollout-report.md
            build/reports/composeLocator/rollout/rollout-report.json
          if-no-files-found: ignore

      - name: Upload release package manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-locator-release-manifest
          path: |
            build/composeLocator/release/release-manifest.txt
            build/composeLocator/release/release-checksums.sha256
          if-no-files-found: ignore

      - name: Upload release archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-locator-release-archive
          path: build/composeLocator/compose-code-locator-*-release.zip
          if-no-files-found: ignore

  device:
    name: Verify connected-device gates
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && inputs.device_serial != ''
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify device regression
        env:
          CODELOCATOR_DEVICE_SERIAL: ${{ inputs.device_serial }}
        run: ./gradlew --no-daemon verifyCodeLocatorDevice -Pcodelocator.studio.useStubs=true
